<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SafeGen — Надежные пароли</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

         # SafeGen # 

        <p class="subtitle">Генератор и сканер надежности

        <div class="main-card">

            <!-- Поле вывода/ввода пароля -->

            <div class="input-group">

                <input type="text" id="password-input" placeholder="Введите или создайте пароль">

                <button id="copy-btn" title="Копировать">📋</button>

            

            <!-- Индикатор надежности -->

            <div class="strength-meter">

                <div id="strength-bar" class="bar">

            

            <p id="strength-text">Введите пароль...

            

            <!-- Настройки генерации -->

            <div class="settings">

                <div class="setting-item">

                    <span>Длина: <b id="length-val">12**</span>

                    <input type="range" id="length-slider" min="6" max="32" value="12">

                

                

                <div class="checkbox-group">

                    <label><input type="checkbox" id="use-upper" checked> А-Z</label>

                    <label><input type="checkbox" id="use-numbers" checked> 0-9</label>

                    <label><input type="checkbox" id="use-symbols" checked> #$!</label>

                

            

            <button id="generate-btn" class="primary-btn">Сгенерировать пароль</button>

        

    

    <script src="script.js"></script>

</body>

</html>
