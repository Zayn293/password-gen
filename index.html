<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGen — Надежные пароли</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>SafeGen</h1>
    <p class="subtitle">Генератор и сканер надежности</p>

    <div class="main-card">
        <div class="input-group">
            <input type="text" id="password-input" placeholder="Введите или создайте пароль">
            <button id="copy-btn" title="Копировать">📋</button>
        </div>

        <div class="strength-meter">
            <div id="strength-bar" class="bar"></div>
        </div>

        <p id="strength-text">Введите пароль...</p>
        <p id="entropy-text" class="entropy"></p>
        <p id="crack-time" class="crack-time"></p>

        <hr>

        <div class="settings">
            <div class="setting-item">
                <span>Длина: <b id="length-val">12</b></span>
                <input type="range" id="length-slider" min="6" max="32" value="12">
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="use-upper" checked> A-Z</label>
                <label><input type="checkbox" id="use-numbers" checked> 0-9</label>
                <label><input type="checkbox" id="use-symbols" checked> #$!</label>
            </div>
        </div>

        <button id="generate-btn" class="primary-btn">Сгенерировать пароль</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
